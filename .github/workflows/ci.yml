name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_FILE: tictactoe.xcodeproj
  IOS_SCHEME: tictactoe iOS
  MACOS_SCHEME: tictactoe macOS
  TEST_PLAN: tictactoeTests

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict

  build-and-test:
    name: Build Apps
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache derived data
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-latest-stable-${{ hashFiles('**/*.xcodeproj', '**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-latest-stable-
            ${{ runner.os }}-xcode-

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build version
        run: |
          xcodebuild -version
          swift --version

      - name: Select iOS simulator destination
        run: |
          ios_destination="$(
            python3 -c "import json, subprocess, sys; devices = json.loads(subprocess.check_output(['xcrun', 'simctl', 'list', 'devices', 'available', '-j'], text=True)).get('devices', {}); runtimes = sorted(devices.items(), reverse=True); match = next((f\"platform=iOS Simulator,id={device['udid']}\" for runtime, runtime_devices in runtimes if 'iOS' in runtime for device in runtime_devices if device.get('isAvailable') and device.get('name', '').startswith('iPhone')), ''); print(match) if match else sys.exit(1)"
          )"
          if [ -z "$ios_destination" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "Using iOS simulator destination: $ios_destination"
          echo "IOS_DESTINATION=$ios_destination" >> "$GITHUB_ENV"

      - name: Build for iOS Simulator
        run: |
          xcodebuild clean build \
            -project "$PROJECT_FILE" \
            -scheme "$IOS_SCHEME" \
            -destination "$IOS_DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO | xcpretty && exit ${PIPESTATUS[0]}

      - name: Build for macOS
        run: |
          xcodebuild clean build \
            -project "$PROJECT_FILE" \
            -scheme "$MACOS_SCHEME" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO | xcpretty && exit ${PIPESTATUS[0]}

  build-spm:
    name: Swift Package Manager Build
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build with SPM (if Package.swift exists)
        run: |
          if [ -f Package.swift ]; then
            swift build
            swift test
          else
            echo "No Package.swift found, skipping SPM build"
          fi
